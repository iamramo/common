services:
  affine:
    image: ghcr.io/toeverything/affine:stable
    container_name: affine
    restart: unless-stopped
    networks: [proxy]
    depends_on:
      affine-redis:
        condition: service_healthy
      affine-postgres:
        condition: service_healthy
      affine_migration:
        condition: service_completed_successfully
    volumes:
      - /opt/docker/affine/storage:/root/.affine/storage
      - /opt/docker/affine/config:/root/.affine/config
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
    environment:
      - TZ=Europe/Stockholm
      - NODE_EXTRA_CA_CERTS=/etc/ssl/certs/ca-certificates.crt
      - REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
      - REDIS_SERVER_HOST=affine-redis
      - DATABASE_URL=postgresql://affine:${POSTGRES_PASSWORD}@affine-postgres:5432/affine
      - AFFINE_INDEXER_ENABLED=false
      - AFFINE_ADMIN_EMAIL=mislimi.ramo@gmail.com

  affine_migration:
    image: ghcr.io/toeverything/affine:stable
    container_name: affine_migration_job
    networks: [proxy]
    volumes:
      - /opt/docker/affine/storage:/root/.affine/storage
      - /opt/docker/affine/config:/root/.affine/config
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
    command: ["sh", "-c", "node ./scripts/self-host-predeploy.js"]
    environment:
      - NODE_EXTRA_CA_CERTS=/etc/ssl/certs/ca-certificates.crt
      - REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
      - REDIS_SERVER_HOST=affine-redis
      - DATABASE_URL=postgresql://affine:${POSTGRES_PASSWORD}@affine-postgres:5432/affine
      - AFFINE_INDEXER_ENABLED=false
    depends_on:
      affine-postgres:
        condition: service_healthy
      affine-redis:
        condition: service_healthy

  affine-redis:
    image: redis:7-alpine
    container_name: affine-redis
    restart: unless-stopped
    networks: [proxy]
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  affine-postgres:
    image: pgvector/pgvector:pg16
    container_name: affine-postgres
    restart: unless-stopped
    networks: [proxy]
    volumes:
      - /opt/docker/affine/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: affine
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: affine
      POSTGRES_INITDB_ARGS: "--data-checksums"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "affine", "-d", "affine"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  proxy:
    external: true
