services:
  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard
    restart: unless-stopped
    networks: [proxy]
    environment:
      - TZ=Europe/Stockholm
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    volumes:
      - /opt/docker/adguard/work:/opt/adguardhome/work
      - /opt/docker/adguard/conf:/opt/adguardhome/conf

networks:
  proxy:
    external: true
